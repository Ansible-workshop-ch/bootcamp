---
- name: Module 5 - deploy a config safely
  hosts: web
  become: true
  gather_facts: true

  tasks:
    - name: Install common packages (loop)
      ansible.builtin.package:
        name: "{{ item }}"
        state: present
      loop: "{{ common_packages }}"

    - name: Install the web package (RedHat family only - condition)
      ansible.builtin.package:
        name: "{{ package_name }}"
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    - name: Deploy the index page from a template
      ansible.builtin.template:
        src: ../templates/index.html.j2
        dest: /var/www/html/index.html
        owner: root
        group: root
        mode: "0644"
      notify: Restart web service

    - name: Deploy Apache configuration on Red Hat systems
      ansible.builtin.template:
        src: ../templates/apache-hardening.conf.j2
        dest: /etc/httpd/conf.d/charter-module5.conf
        owner: root
        group: root
        mode: "0644"
      when: ansible_facts['os_family'] == "RedHat"
      notify: Restart web service

    - name: Deploy Apache configuration on Debian systems
      ansible.builtin.template:
        src: ../templates/apache-hardening.conf.j2
        dest: /etc/apache2/conf-available/charter-module5.conf
        owner: root
        group: root
        mode: "0644"
      when: ansible_facts['os_family'] == "Debian"
      notify: Restart web service

    - name: Verify the website responds
      ansible.builtin.uri:
        url: "http://localhost:{{ web_port }}"
        status_code: 200
        return_content: false

    - name: Verify that the operating system is supported
      ansible.builtin.assert:
        that:
          - ansible_facts['os_family'] in ['RedHat', 'Debian']
        fail_msg: >-
          Unsupported operating system family:
          {{ ansible_facts['os_family'] }}
        success_msg: >-
          Supported operating system family:
          {{ ansible_facts['os_family'] }}
    - name: Remove stale APT lists
      ansible.builtin.file:
        path: /var/lib/apt/lists
        state: absent
      when: ansible_facts["os_family"] == "Debian"

    - name: Recreate APT lists directory
      ansible.builtin.file:
        path: /var/lib/apt/lists
        state: directory
        mode: "0755"
      when: ansible_facts["os_family"] == "Debian"

    - name: Update APT cache and install Apache
      ansible.builtin.apt:
        name: apache2
        state: present
        update_cache: true
      when: ansible_facts["os_family"] == "Debian"
    - name: Refresh Ubuntu package cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 0
      when: ansible_facts["os_family"] == "Debian"

    - name: Install Ubuntu packages
      ansible.builtin.apt:
        name:
          - apache2
          - vim
          - curl
        state: present
      when: ansible_facts["os_family"] == "Debian"

    - name: Install RHEL packages
      ansible.builtin.dnf:
        name:
          - httpd
          - vim
          - curl-minimal
        state: present
      when: ansible_facts["os_family"] == "RedHat"
    - name: Create Charter directory
      ansible.builtin.file:
        path: /etc/charter
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Create Module 5 file
      ansible.builtin.copy:
        content: |
          Module 5 completed on {{ inventory_hostname }}
        dest: /etc/charter/module5.txt
        owner: root
        group: root
        mode: "0644"


  handlers:
    - name: Restart web service
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: restarted
