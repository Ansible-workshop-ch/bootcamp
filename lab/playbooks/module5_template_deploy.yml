---
# Module 5: conditions + loops + template + handler working together.
- name: Module 5 - deploy a config safely
  hosts: web
  become: true
  gather_facts: true

  tasks:
    - name: Install common packages (loop)
      ansible.builtin.package:
        name: "{{ item }}"
        state: present
      loop: "{{ common_packages }}"

    - name: Install the web package (RedHat family only - condition)
      ansible.builtin.package:
        name: "{{ package_name }}"
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    - name: Deploy the index page from a template
      ansible.builtin.template:
        src: ../templates/index.html.j2
        dest: /var/www/html/index.html
        owner: root
        group: root
        mode: "0644"
      notify: Restart web service

  handlers:
    - name: Restart web service
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: restarted
