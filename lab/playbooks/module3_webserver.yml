---
- name: Module 3 - basic web server setup
  hosts: web
  become: true
  gather_facts: true

  tasks:
    - name: Install the web package
      ansible.builtin.package:
        name: "{{ package_name }}"
        state: present

    - name: Ensure web document root exists
      ansible.builtin.file:
        path: /var/www/html
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Deploy a simple index page
      ansible.builtin.copy:
        dest: /var/www/html/index.html
        content: |
          <h1>{{ web_message }}</h1>
          <p>Host: {{ inventory_hostname }}</p>
          <p>Package: {{ package_name }}</p>
          <p>Service: {{ service_name }}</p>
          <p>OS family: {{ ansible_facts["os_family"] }}</p>
        owner: root
        group: root
        mode: "0644"

    - name: Ensure the web service is running
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: started
