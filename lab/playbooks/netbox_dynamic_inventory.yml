---
- name: Test hosts discovered from NetBox
  hosts: all
  gather_facts: true

  tasks:
    - name: Verify Ansible connectivity
      ansible.builtin.ping:

    - name: Show merged inventory information
      ansible.builtin.debug:
        msg:
          - "Inventory name: {{ inventory_hostname }}"
          - "Connection address: {{ ansible_host | default(inventory_hostname) }}"
          - "SSH port: {{ ansible_port | default(22) }}"
          - "SSH user: {{ ansible_user | default('not defined') }}"
          - "Operating system: {{ ansible_distribution | default('unknown') }}"
          - "Groups: {{ group_names | join(', ') }}"