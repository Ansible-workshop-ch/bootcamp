---


- name: Bonus - create EC2 using exact_count
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    aws_region: us-east-2
    instance_type: t3.micro
    key_name: ray-vault-key
    sg_name: ansible-ec2-demo-sg
    instance_name: ansible-exact-demo

    nginx_user_data: |
      #!/bin/bash
      apt-get update
      apt-get install -y nginx
      systemctl enable nginx
      systemctl start nginx
      echo "Created by Ansible exact_count demo" > /var/www/html/index.html

  tasks:
    - name: Find default VPC
      amazon.aws.ec2_vpc_net_info:
        region: "{{ aws_region }}"
        filters:
          is-default: "true"
      register: vpc_info

    - name: Fail if no default VPC exists
      ansible.builtin.fail:
        msg: "No default VPC found in region {{ aws_region }}."
      when: vpc_info.vpcs | length == 0

    # Save the default VPC ID into a variable we can reuse later.
    - name: Set default VPC ID
      ansible.builtin.set_fact:
        default_vpc_id: "{{ vpc_info.vpcs[0].vpc_id }}"

    # Find a subnet inside the default VPC.
    # EC2 instances must be launched into a subnet.
    - name: Find subnet in default VPC
      amazon.aws.ec2_vpc_subnet_info:
        region: "{{ aws_region }}"
        filters:
          vpc-id: "{{ default_vpc_id }}"
      register: subnet_info


    - name: Fail if no subnet exists in the default VPC
      ansible.builtin.fail:
        msg: "No subnet found in default VPC {{ default_vpc_id }}."
      when: subnet_info.subnets | length == 0

    - name: Set subnet ID
      ansible.builtin.set_fact:
        default_subnet_id: "{{ subnet_info.subnets[0].subnet_id }}"

    # Find the latest Ubuntu 24.04 AMI from Canonical.
    # This avoids hardcoding an AMI ID because AMI IDs change by region and over time.
    - name: Find latest Ubuntu 24.04 AMI
      amazon.aws.ec2_ami_info:
        region: "{{ aws_region }}"
        owners:
          - "099720109477"
        filters:
          name: "ubuntu/images/hvm-ssd-gp3/ubuntu-noble-24.04-amd64-server-*"
          architecture: x86_64
          virtualization-type: hvm
          root-device-type: ebs
      register: ubuntu_ami_info

    # Stop the playbook if no Ubuntu AMI is found.
    - name: Fail if no Ubuntu AMI was found
      ansible.builtin.fail:
        msg: "No Ubuntu 24.04 AMI found in region {{ aws_region }}."
      when: ubuntu_ami_info.images | length == 0

    # Sort the returned AMIs by creation date and pick the newest one.
    - name: Set latest Ubuntu AMI ID
      ansible.builtin.set_fact:
        ubuntu_ami_id: "{{ (ubuntu_ami_info.images | sort(attribute='creation_date') | last).image_id }}"

    # Create a security group for the demo instance.
    # This allows SSH on port 22 and HTTP on port 80.
    - name: Create security group for SSH and HTTP
      amazon.aws.ec2_security_group:
        name: "{{ sg_name }}"
        description: Ansible EC2 demo security group
        region: "{{ aws_region }}"
        vpc_id: "{{ default_vpc_id }}"
        rules:
          # Allow SSH access for the demo.
          # In production, do not use 0.0.0.0/0 for SSH.
          - proto: tcp
            from_port: 22
            to_port: 22
            cidr_ip: 0.0.0.0/0
            rule_desc: Allow SSH for demo

          # Allow HTTP access so we can test nginx in a browser or with curl.
          - proto: tcp
            from_port: 80
            to_port: 80
            cidr_ip: 0.0.0.0/0
            rule_desc: Allow HTTP for demo

        # Allow outbound traffic from the instance.
        rules_egress:
          - proto: all
            cidr_ip: 0.0.0.0/0
      register: web_sg

    # This is the main EC2 creation task.
    #
    # exact_count: 1 means:
    # Make sure exactly one matching EC2 instance exists.
    #
    # This is safer than count: 1 for repeatable labs.
    #
    # count: 1 can create another instance every time if used carelessly.
    # exact_count: 1 checks the filters first, then decides whether to create.
    - name: Ensure exactly one matching EC2 instance is running
      amazon.aws.ec2_instance:
        region: "{{ aws_region }}"
        image_id: "{{ ubuntu_ami_id }}"
        instance_type: "{{ instance_type }}"
        key_name: "{{ key_name }}"

        # The key teaching point of this lab.
        # This keeps the playbook repeatable and safer to run more than once.
        exact_count: 1

        # Wait until AWS finishes creating or finding the instance.
        wait: true

        # Run the nginx setup script during first boot.
        user_data: "{{ nginx_user_data }}"

        # Filters define which EC2 instances count as matching.
        # exact_count depends on these filters.
        # Without clear filters, Ansible may not know which instance belongs to this lab.
        filters:
          "tag:Name": "{{ instance_name }}"
          "tag:ManagedBy": Ansible
          "tag:Lab": exact-count-demo
          instance-state-name: running

        # Launch the instance into the default subnet.
        vpc_subnet_id: "{{ default_subnet_id }}"

        # Attach the security group created above.
        security_groups:
          - "{{ web_sg.group_id }}"

        # Assign a public IP so the instance can be reached for demo/testing.
        network:
          assign_public_ip: true

        # Tags make the instance easy to identify and allow exact_count filters to work.
        tags:
          Name: "{{ instance_name }}"
          ManagedBy: Ansible
          Lab: exact-count-demo
          Course: Charter Ansible Training

        # Desired state of the EC2 instance.
        state: running
      register: ec2_result

    # Print the result so students can see what Ansible created or found.
    # This helps show instance IDs, public IPs, and any terminated instances.
    - name: Show EC2 result
      ansible.builtin.debug:
        msg:
          instance_ids: "{{ ec2_result.instance_ids | default([]) }}"
          public_ips: "{{ ec2_result.instances | map(attribute='public_ip_address') | list }}"
          terminated_ids: "{{ ec2_result.terminated_ids | default([]) }}"
