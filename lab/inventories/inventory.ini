# Local Podman container targets for Ansible training
# replace the ansible_ssh_private_key_file path with your own private key path
# remember to set the correct ansible_python_interpreter path for your container OS
# replace the ansible_port values with the correct port mappings for your containers
# replace the ansible_user value with the correct user for your container OS
# remember to set the correct ansible_ssh_common_args for your container OS test

[ubuntu_web]
container1 ansible_host=127.0.0.1 ansible_port=2222 ansible_user=ansible ansible_ssh_private_key_file=/Users/ray/.ssh/ansible_lab_key ansible_python_interpreter=/usr/bin/python3 ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
container2 ansible_host=127.0.0.1 ansible_port=2223 ansible_user=ansible ansible_ssh_private_key_file=/Users/ray/.ssh/ansible_lab_key ansible_python_interpreter=/usr/bin/python3 ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
container3 ansible_host=127.0.0.1 ansible_port=2224 ansible_user=ansible ansible_ssh_private_key_file=/Users/ray/.ssh/ansible_lab_key ansible_python_interpreter=/usr/bin/python3 ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

[rhel_web]
rhel1 ansible_host=127.0.0.1 ansible_port=2232 ansible_user=ansible ansible_ssh_private_key_file=/Users/ray/.ssh/ansible_lab_key ansible_python_interpreter=/usr/bin/python3 ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
rhel2 ansible_host=127.0.0.1 ansible_port=2233 ansible_user=ansible ansible_ssh_private_key_file=/Users/ray/.ssh/ansible_lab_key ansible_python_interpreter=/usr/bin/python3 ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
rhel3 ansible_host=127.0.0.1 ansible_port=2234 ansible_user=ansible ansible_ssh_private_key_file=/Users/ray/.ssh/ansible_lab_key ansible_python_interpreter=/usr/bin/python3 ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

[web:children]
ubuntu_web
rhel_web
