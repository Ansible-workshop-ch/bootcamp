# Charter Ansible Training - sample inventory
# Replace the ansible_host values with your lab host IPs/names.

[web]
server1 ansible_host=10.0.0.11
server2 ansible_host=10.0.0.12

[db]
dbserver1 ansible_host=10.0.0.21

# Convenience group that contains all Linux lab hosts
[linux:children]
web
db

# Group-level connection defaults (override per host in host_vars if needed)
[linux:vars]
ansible_user=ansible
ansible_python_interpreter=/usr/bin/python3
