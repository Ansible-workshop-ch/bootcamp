# Local Podman container targets for Ansible training
# Remember to set the ansible_python_interpreter to /usr/bin/python3 for all containers
# Replace /Users/ray/.ssh/ansible_lab_key with the path to your private key for the ansible user in the containers

[web]
container1 ansible_host=127.0.0.1 ansible_port=2222 ansible_user=ansible ansible_ssh_private_key_file=/Users/ray/.ssh/ansible_lab_key ansible_python_interpreter=/usr/bin/python3 ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
container2 ansible_host=127.0.0.1 ansible_port=2223 ansible_user=ansible ansible_ssh_private_key_file=/Users/ray/.ssh/ansible_lab_key ansible_python_interpreter=/usr/bin/python3 ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
container3 ansible_host=127.0.0.1 ansible_port=2224 ansible_user=ansible ansible_ssh_private_key_file=/Users/ray/.ssh/ansible_lab_key ansible_python_interpreter=/usr/bin/python3 ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

[linux:children]
web
