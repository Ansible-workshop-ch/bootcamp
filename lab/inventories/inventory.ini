# Local Podman container targets for Ansible training

[linux]
container1 ansible_host=127.0.0.1 ansible_port=2222 ansible_user=ansible ansible_ssh_private_key_file=~/.ssh/ansible_lab_key ansible_python_interpreter=/usr/bin/python3 ansible_ssh_common_args='-o StrictHostKeyChecking=no'
container2 ansible_host=127.0.0.1 ansible_port=2223 ansible_user=ansible ansible_ssh_private_key_file=~/.ssh/ansible_lab_key ansible_python_interpreter=/usr/bin/python3 ansible_ssh_common_args='-o StrictHostKeyChecking=no'
container3 ansible_host=127.0.0.1 ansible_port=2224 ansible_user=ansible ansible_ssh_private_key_file=~/.ssh/ansible_lab_key ansible_python_interpreter=/usr/bin/python3 ansible_ssh_common_args='-o StrictHostKeyChecking=no'
