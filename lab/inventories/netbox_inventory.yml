---
plugin: netbox.netbox.nb_inventory
validate_certs: true

query_filters:
  - status: active

group_by:
  - sites
  - device_roles
  - platforms

keyed_groups:
  - prefix: site
    key: site.slug

  - prefix: role
    key: device_role.slug

compose:
  ansible_host: primary_ip4.address | split('/') | first